name: Update Documentation

on:
  workflow_run:
    workflows: ["Create Docker Container"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update_docs:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for image availability
        run: |
          for i in {1..30}; do
            if docker pull techlotse/codestream-cloudcli:latest > /dev/null 2>&1; then
              echo "Image pulled successfully"
              exit 0
            fi
            echo "Attempt $i: Waiting for image availability..."
            sleep 10
          done
          echo "Image not available after 5 minutes"
          exit 1

      - name: Get container versions
        id: get_versions
        run: |
          echo "Extracting versions from container..."
          AWS_CLI_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest aws --version 2>&1 | cut -d' ' -f1 | cut -d'/' -f2)
          TERRAFORM_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest terraform version 2>&1 | grep Terraform | head -1 | cut -d' ' -f2)
          PACKER_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest packer version 2>&1)
          ANSIBLE_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest ansible --version 2>&1 | head -1 | awk '{print $2}')
          AZURE_CLI_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest az version 2>&1 | grep '"azure-cli"' | cut -d':' -f2 | tr -d ' ",' || echo "unknown")
          YQ_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest yq --version 2>&1 | awk '{print $3}')
          JQ_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest jq --version 2>&1)
          DOCKER_IMAGE_VERSION=$(docker inspect --format='{{index .RepoDigests 0}}' techlotse/codestream-cloudcli:latest)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "aws_cli_version=$AWS_CLI_VERSION" >> $GITHUB_OUTPUT
          echo "terraform_version=$TERRAFORM_VERSION" >> $GITHUB_OUTPUT
          echo "packer_version=$PACKER_VERSION" >> $GITHUB_OUTPUT
          echo "ansible_version=$ANSIBLE_VERSION" >> $GITHUB_OUTPUT
          echo "azure_cli_version=$AZURE_CLI_VERSION" >> $GITHUB_OUTPUT
          echo "yq_version=$YQ_VERSION" >> $GITHUB_OUTPUT
          echo "jq_version=$JQ_VERSION" >> $GITHUB_OUTPUT
          echo "docker_image_version=$DOCKER_IMAGE_VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Update README with latest versions
        run: |
          cat > README.md << EOF
[![Publish Docker image](https://github.com/techlotse/codestream-cloudcli/actions/workflows/container-build.yml/badge.svg)](https://github.com/techlotse/codestream-cloudcli/actions/workflows/container-build.yml)   [![Documentation](https://github.com/techlotse/codestream-cloudcli/actions/workflows/update-docs.yml/badge.svg)](https://github.com/techlotse/codestream-cloudcli/actions/workflows/update-docs.yml)

# CodeStream-CloudCLI

A lightweight, security-focused Docker container with essential cloud and infrastructure CLI tools for automation pipelines and CI/CD workflows.

## Docker Image

- **Image**: \`techlotse/codestream-cloudcli\`
- **Latest Tag**: \`latest\` or \`v<version>\` or \`<YYYYMMDD>\`
- **Base Image**: Alpine Linux 3.19 (lightweight & security-focused)
- **Image Digest**: ${{ steps.get_versions.outputs.docker_image_version }}
- **Last Updated**: ${{ steps.get_versions.outputs.build_date }}

## Installed Tools and Versions

| Tool | Version |
|------|---------|
| AWS CLI | ${{ steps.get_versions.outputs.aws_cli_version }} |
| Azure CLI | ${{ steps.get_versions.outputs.azure_cli_version }} |
| Terraform | ${{ steps.get_versions.outputs.terraform_version }} |
| Packer | ${{ steps.get_versions.outputs.packer_version }} |
| Ansible | ${{ steps.get_versions.outputs.ansible_version }} |
| yq | ${{ steps.get_versions.outputs.yq_version }} |
| jq | ${{ steps.get_versions.outputs.jq_version }} |

## Additional Included Tools

- curl, wget, unzip
- git
- Python 3 with pip
- sed, awk (GNU AWK)
- CA certificates & OpenSSL
- make
- bind-tools (dns utilities)

## Usage

Basic usage:

\`\`\`bash
docker run -it techlotse/codestream-cloudcli:latest
\`\`\`

## Versioning

- **Semantic Versioning**: Images are tagged with semantic versions (v0.3.0, etc.)
- **Date Tags**: Images are also tagged with build dates (YYYYMMDD format)
- **Latest Tag**: Always points to the most recent stable build
- **Build Schedule**: Weekly builds on Sunday at 6:00 AM UTC

## Build and Push Schedule

This image is automatically built and pushed to Docker Hub:

- **Schedule**: Every Sunday at 6:00 AM UTC (7:00 AM CET)
- **Trigger**: Automated weekly schedule via GitHub Actions
- **Registry**: Docker Hub (techlotse/codestream-cloudcli)

## Documentation Updates

The README is automatically updated after each successful container build with the latest tool versions. Documentation updates do not trigger new container builds, ensuring a clean separation of concerns.

## Description

This repository contains the Dockerfile and automation scripts for building the CodeStream CloudCLI Docker image, used for managing cloud resources through various CLI tools. The container is optimized for use in automation pipelines, CI/CD systems, and infrastructure-as-code workflows.
EOF

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.email "info@techlotse.io"
          git config --global user.name "GitHub Actions"
          git add README.md
          git commit -m "docs: update tool versions from container build [skip ci]"
          git push

      - name: Skip commit if no changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No version changes detected, skipping commit"

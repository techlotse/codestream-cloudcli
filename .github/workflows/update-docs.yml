name: Update Documentation

on:
  workflow_run:
    workflows: ["Create Docker Container"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update_docs:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for image availability
        run: |
          for i in {1..30}; do
            if docker pull techlotse/codestream-cloudcli:latest > /dev/null 2>&1; then
              echo "Image pulled successfully"
              exit 0
            fi
            echo "Attempt $i: Waiting for image availability..."
            sleep 10
          done
          echo "Image not available after 5 minutes"
          exit 1

      - name: Get container versions
        id: get_versions
        run: |
          echo "Extracting versions from container..."
          AWS_CLI_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest aws --version 2>&1 | cut -d' ' -f1 | cut -d'/' -f2)
          TERRAFORM_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest terraform version 2>&1 | grep Terraform | head -1 | cut -d' ' -f2)
          PACKER_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest packer version 2>&1)
          ANSIBLE_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest ansible --version 2>&1 | head -1 | awk '{print $2}')
          AZURE_CLI_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest az version 2>&1 | grep '"azure-cli"' | cut -d':' -f2 | tr -d ' ",' || echo "unknown")
          YQ_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest yq --version 2>&1 | awk '{print $3}')
          JQ_VERSION=$(docker run --rm techlotse/codestream-cloudcli:latest jq --version 2>&1)
          DOCKER_IMAGE_VERSION=$(docker inspect --format='{{index .RepoDigests 0}}' techlotse/codestream-cloudcli:latest)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "aws_cli_version=$AWS_CLI_VERSION" >> $GITHUB_OUTPUT
          echo "terraform_version=$TERRAFORM_VERSION" >> $GITHUB_OUTPUT
          echo "packer_version=$PACKER_VERSION" >> $GITHUB_OUTPUT
          echo "ansible_version=$ANSIBLE_VERSION" >> $GITHUB_OUTPUT
          echo "azure_cli_version=$AZURE_CLI_VERSION" >> $GITHUB_OUTPUT
          echo "yq_version=$YQ_VERSION" >> $GITHUB_OUTPUT
          echo "jq_version=$JQ_VERSION" >> $GITHUB_OUTPUT
          echo "docker_image_version=$DOCKER_IMAGE_VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Update README with latest versions
        run: |
          export AWS_VERSION='${{ steps.get_versions.outputs.aws_cli_version }}'
          export AZURE_VERSION='${{ steps.get_versions.outputs.azure_cli_version }}'
          export TERRAFORM_VERSION='${{ steps.get_versions.outputs.terraform_version }}'
          export PACKER_VERSION='${{ steps.get_versions.outputs.packer_version }}'
          export ANSIBLE_VERSION='${{ steps.get_versions.outputs.ansible_version }}'
          export YQ_VERSION='${{ steps.get_versions.outputs.yq_version }}'
          export JQ_VERSION='${{ steps.get_versions.outputs.jq_version }}'
          export IMAGE_VERSION='${{ steps.get_versions.outputs.docker_image_version }}'
          export BUILD_DATE='${{ steps.get_versions.outputs.build_date }}'
          
          envsubst < .github/workflows/README.template > README.md

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.email "info@techlotse.io"
          git config --global user.name "GitHub Actions"
          git add README.md
          git commit -m "docs: update tool versions from container build [skip ci]"
          git push

      - name: Skip commit if no changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No version changes detected, skipping commit"

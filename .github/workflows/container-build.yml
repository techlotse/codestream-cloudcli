name: Create Docker Container

on:
  schedule:
    # Run every Sunday at 6:00 AM UTC (which is 7:00 AM CET)
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ORG_DOCKERHUB_USER }}
          password: ${{ secrets.ORG_DOCKERHUB_KEY }}

      - name: Get the current date
        id: current_date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Get version from file
        id: version
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=0.3.0" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            techlotse/codestream-cloudcli:v${{ steps.version.outputs.version }}
            techlotse/codestream-cloudcli:${{ steps.current_date.outputs.date }}
            techlotse/codestream-cloudcli:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ steps.current_date.outputs.date }}
